name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: go vet
        run: go vet ./...

      - name: unit tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: build and package all targets
        run: |
          go test -tags integration -timeout 600s ./internal/integration/ \
            -run TestBuildAndPackageAllTargets -v
        env:
          RUN_INTEGRATION: "1"
