name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: go vet
        run: go vet ./...

      - name: unit tests
        run: go test ./...

  cross-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: cross-compile all supported targets
        run: |
          go test -tags crosscompile -timeout 600s ./internal/arch/ \
            -run TestCrossCompileAllTargets \
            -v
        env:
          RUN_CROSS_COMPILE_TEST: "1"
